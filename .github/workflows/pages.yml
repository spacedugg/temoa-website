name: Preview auf GitHub Pages

# Statische Preview der gesamten Website (alle Entwürfe) unter
# https://spacedugg.github.io/temoa-website/ — deployt bei jedem Push auf
# den Arbeits-Branch per Force-Push auf den gh-pages-Branch (die Pages-Site
# wurde durch das erstmalige Anlegen von gh-pages automatisch aktiviert;
# der Artifact-Weg scheiterte am Token: "Create Pages site failed").
on:
  push:
    branches: [claude/pensive-fermi-wnta6u]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx next build
        env:
          NEXT_OUTPUT: export
          NEXT_PUBLIC_BASE_PATH: /temoa-website
      # Rohe <img src="/assets/..."> bekommen von Next kein basePath-Präfix —
      # in der exportierten Ausgabe nachziehen (HTML, JS-Chunks, RSC-Payloads).
      - run: |
          find out -type f \( -name '*.html' -o -name '*.js' -o -name '*.txt' \) \
            -exec sed -i 's|"/assets/|"/temoa-website/assets/|g; s|'"'"'/assets/|'"'"'/temoa-website/assets/|g' {} +
      - run: |
          cd out
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Pages-Preview: ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
